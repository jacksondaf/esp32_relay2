<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motor Control</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #111;
      color: white;
      margin-top: 60px;
    }
    button {
      width: 200px;
      height: 60px;
      font-size: 20px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }
    .on  { background: green; color: white; }
    .off { background: red;   color: white; }
    #status {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Motor Control</h1>
  <button class="on"  onclick="setMotor(true)">ON</button><br>
  <button class="off" onclick="setMotor(false)">OFF</button>
  <div id="status">Status: Loading...</div>

  <script type="module">
    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue }
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, signInAnonymously }
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyA8rvg1tQDLUwmyBdm0toraWs-Hz0_jtAU",
      authDomain:        "esp32-relay-2.firebaseapp.com",
      databaseURL:       "https://esp32-relay-2-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId:         "esp32-relay-2",
      storageBucket:     "esp32-relay-2.firebasestorage.app",
      messagingSenderId: "371864991133",
      appId:             "1:371864991133:web:d8f0d53336f21d43102b74"
    };

    const app      = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const auth     = getAuth(app);
    const ledRef   = ref(database, "/ledState");
    const statusDiv = document.getElementById("status");

    // ── Anonymous login then start listening ──
    signInAnonymously(auth).then(() => {

      // ── Send boolean true/false ──
      window.setMotor = function(value) {
        set(ledRef, value);
      }

      // ── Listen for state changes ──
      onValue(ledRef, (snapshot) => {
        const value = snapshot.val();
        if (value === true) {
          statusDiv.innerHTML   = "Motor Status: ON";
          statusDiv.style.color = "green";
        } else {
          statusDiv.innerHTML   = "Motor Status: OFF";
          statusDiv.style.color = "red";
        }
      });

    }).catch((error) => {
      statusDiv.innerHTML   = "Auth Error: " + error.message;
      statusDiv.style.color = "orange";
    });

  </script>
</body>
</html>
